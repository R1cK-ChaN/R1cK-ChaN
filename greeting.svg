<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes wave {
      0%, 100% { transform: rotate(0deg) }
      10% { transform: rotate(14deg) }
      20% { transform: rotate(-8deg) }
      30% { transform: rotate(14deg) }
      40% { transform: rotate(-4deg) }
      50% { transform: rotate(10deg) }
      60% { transform: rotate(0deg) }
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px) }
      100% { opacity: 1; transform: translateY(0) }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0 }
      100% { background-position: 200% 0 }
    }

    .container {
      --bg: #1a1a1a;
      --text: #f0f0f0;
      --sub: #999999;
      --border: #333333;
      --accent: #666666;

      width: 600px;
      height: 160px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 20px auto;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    @media (prefers-color-scheme: light) {
      .container {
        --bg: #ffffff;
        --text: #1a1a1a;
        --sub: #666666;
        --border: #e0e0e0;
        --accent: #999999;
      }
    }

    @media (prefers-reduced-motion) {
      .container * { animation: none !important }
    }

    .wave {
      animation: wave 2s ease-in-out infinite;
      display: inline-block;
      transform-origin: 70% 70%;
    }

    h1 {
      margin: 0;
      padding: 0;
      color: var(--text);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      animation: fadeIn 0.6s ease forwards;
    }

    p {
      margin: 6px 0 0 0;
      padding: 0;
      color: var(--sub);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.5px;
      animation: fadeIn 0.6s ease 0.2s forwards;
      opacity: 0;
    }

    .parent {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
  </style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="parent">
      <div class="container">
        <h1>Hi, I'm Rick <span class="wave">&#x1F44B;</span></h1>
        <p>Quant Agent Engineer</p>
      </div>
    </div>
  </foreignObject>
</svg>
