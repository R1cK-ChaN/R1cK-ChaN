<svg viewBox="0 0 600 160" width="600" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="35" />
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <clipPath id="rounded">
      <rect width="600" height="160" rx="14" />
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- dark base -->
    <rect width="600" height="160" fill="#0a0a0f" />

    <!-- flowing blobs -->
    <ellipse cx="120" cy="40" rx="160" ry="90" fill="rgba(56,109,194,0.55)" filter="url(#blur1)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 60,-15; 120,10; 40,20; 0,0" dur="8s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="480" cy="130" rx="140" ry="80" fill="rgba(99,66,168,0.50)" filter="url(#blur2)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -50,15; -100,-10; -30,-25; 0,0" dur="10s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="300" cy="80" rx="120" ry="70" fill="rgba(20,148,133,0.40)" filter="url(#blur3)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 80,15; -40,-10; 0,0" dur="12s" repeatCount="indefinite" />
    </ellipse>

    <ellipse cx="180" cy="120" rx="100" ry="60" fill="rgba(56,109,194,0.30)" filter="url(#blur2)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 30,-25; 100,-10; 50,15; 0,0" dur="9s" repeatCount="indefinite" />
    </ellipse>

    <!-- text -->
    <text x="300" y="72" text-anchor="middle" fill="#f0f0f2" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="-0.5">
      Hi, I'm Rick 👋
    </text>
    <text x="300" y="102" text-anchor="middle" fill="rgba(180,180,195,0.9)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="1.5">
      QUANT AGENT ENGINEER
    </text>
  </g>

  <!-- subtle border -->
  <rect width="600" height="160" rx="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
</svg>
