<svg viewBox="0 0 900 160" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'DM Sans';
        font-weight: 600;
        src: url(data:font/woff2;base64,) format('woff2');
      }
    </style>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#386dc2" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#386dc2" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#386dc2" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6342a8" stop-opacity="0.55" />
      <stop offset="40%" stop-color="#6342a8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6342a8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#149485" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#149485" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#149485" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a6fa5" stop-opacity="0.4" />
      <stop offset="40%" stop-color="#4a6fa5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4a6fa5" stop-opacity="0" />
    </radialGradient>
    <clipPath id="rounded">
      <rect width="900" height="160" rx="14" />
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- dark base -->
    <rect width="900" height="160" fill="#0a0a0f" />

    <!-- blob 1: blue, left -->
    <ellipse cx="160" cy="30" rx="240" ry="130" fill="url(#glow1)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 70,-10; 140,15; 50,20; 0,0"
        dur="8s" repeatCount="indefinite" />
    </ellipse>

    <!-- blob 2: purple, right -->
    <ellipse cx="720" cy="140" rx="220" ry="120" fill="url(#glow2)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -60,10; -120,-15; -30,-20; 0,0"
        dur="10s" repeatCount="indefinite" />
    </ellipse>

    <!-- blob 3: teal, center -->
    <ellipse cx="450" cy="80" rx="200" ry="110" fill="url(#glow3)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 90,12; -50,-15; 0,0"
        dur="12s" repeatCount="indefinite" />
    </ellipse>

    <!-- blob 4: blue, bottom-left -->
    <ellipse cx="300" cy="130" rx="180" ry="100" fill="url(#glow4)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 40,-20; 110,-5; 60,15; 0,0"
        dur="9s" repeatCount="indefinite" />
    </ellipse>

    <!-- title -->
    <text x="450" y="80" text-anchor="middle" fill="#f0f0f2"
      font-family="'DM Sans',-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
      font-size="30" font-weight="600" letter-spacing="-0.3"
      dominant-baseline="central">
      Hello, I&#x27;m Rick Chan
    </text>

  </g>

  <!-- border -->
  <rect width="900" height="160" rx="14" fill="none" stroke="#222" stroke-width="1" />
</svg>
